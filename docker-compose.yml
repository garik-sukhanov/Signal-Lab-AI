services:
  postgres:
    image: postgres:16-alpine
    container_name: signal-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: signal-lab-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    ports:
      - "${BACKEND_PORT}:3001"
    volumes:
      - ./:/workspace
      - /workspace/apps/backend/node_modules
    command: >
      sh -c "npm run prisma:generate &&
             npm run prisma:migrate &&
             npm run start:dev"
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: signal-lab-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./:/workspace
      - /workspace/apps/frontend/node_modules
      - /workspace/apps/frontend/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    restart: unless-stopped

volumes:
  postgres_data:
