services:
  postgres:
    image: postgres:16-alpine
    container_name: signal-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: signal-lab-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-signal-lab@dev}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    ports:
      - "${BACKEND_PORT}:3001"
    volumes:
      - ./:/workspace
      - /workspace/apps/backend/node_modules
    command: >
      sh -c "npm run prisma:generate &&
             npm run prisma:migrate &&
             npm run start:dev"
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: signal-lab-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT}
      NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3100}
      NEXT_PUBLIC_SENTRY_URL: ${NEXT_PUBLIC_SENTRY_URL:-https://sentry.io}
      NEXT_PUBLIC_LOKI_EXPLORE_URL: ${NEXT_PUBLIC_LOKI_EXPLORE_URL:-http://localhost:3100/explore}
      NEXT_PUBLIC_LOKI_QUERY: '${NEXT_PUBLIC_LOKI_QUERY:-{app="signal-lab"}}'
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./:/workspace
      - /workspace/apps/frontend/node_modules
      - /workspace/apps/frontend/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.7.3
    container_name: signal-lab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - backend
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: signal-lab-loki
    ports:
      - "3101:3100"
    volumes:
      - ./infra/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    container_name: signal-lab-promtail
    volumes:
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    container_name: signal-lab-grafana
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
  loki_data:
